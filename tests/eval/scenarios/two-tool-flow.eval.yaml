- name: get-tools-then-use-tools
  description: Two-tool architecture — discover tools then execute
  toolSet: meta
  turns:
    - userMessage: "Read the file notes/meeting.md"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: read
                description: Read the content of a note file
                command: "content read"
                usage: "content read <path> <startLine>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: startLine
                    flag: --start-line
                    type: number
                    required: true
                    positional: true
                examples:
                  - 'content read "path-value" 1'

    - expectedTools:
        - name: useTools
          params:
            tool: "content read"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: contentManager_read
                success: true
                result:
                  content: "# Meeting Notes\n\n- Discussed roadmap\n- Budget approved"
                  path: notes/meeting.md
