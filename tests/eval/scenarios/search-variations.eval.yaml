# Search and list operation variations — tests correct tool routing
# for different flavors of "find/search/list" user requests.

- name: search-by-content-keyword
  description: User asks to find notes about a topic — should use searchManager_searchContent
  toolSet: meta
  turns:
    - userMessage: "Find all my notes about machine learning"
      expectedTools:
        - name: getTools
          params:
            tool: "search"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: searchManager
                tool: searchContent
                description: Search for notes containing specific content
                command: "search search-content"
                usage: "search search-content <query> [--limit <limit>]"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                  - name: limit
                    flag: --limit
                    type: number
                    required: false
                    positional: false
                examples:
                  - 'search search-content "query-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "search search-content"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: searchContent
                success: true
                data:
                  results:
                    - path: notes/ml-intro.md
                      score: 0.92
                    - path: research/transformers.md
                      score: 0.87

- name: list-folder-contents
  description: User asks what's in a folder — should use storageManager_list not searchManager
  toolSet: meta
  turns:
    - userMessage: "What files are in my projects folder?"
      expectedTools:
        - name: getTools
          params:
            tool: "storage"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: storageManager
                tool: list
                description: List files and folders in a directory
                command: "storage list"
                usage: "storage list <path>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'storage list "path-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "storage list"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: list
                success: true
                data:
                  items:
                    - name: project-a
                      type: folder
                    - name: README.md
                      type: file

- name: search-then-read-chain
  description: User asks to find and read — model should chain searchManager then contentManager
  toolSet: meta
  allowReorder: true
  turns:
    - userMessage: "Search for my notes about the quarterly budget and show me the most relevant one"
      expectedTools:
        - name: getTools
          params:
            tool: "search, content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: searchManager
                tool: searchContent
                description: Search for notes containing specific content
                command: "search search-content"
                usage: "search search-content <query>"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'search search-content "query-value"'
              - agent: contentManager
                tool: read
                description: Read content from a file
                command: "content read"
                usage: "content read <path> <startLine>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: startLine
                    flag: --start-line
                    type: number
                    required: true
                    positional: true
                examples:
                  - 'content read "path-value" 1'

    - expectedTools:
        - name: useTools
          params:
            tool: "search search-content"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: searchContent
                success: true
                data:
                  results:
                    - path: finance/q2-budget.md
                      score: 0.94

    - expectedTools:
        - name: useTools
          params:
            tool: "content read"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: read
                success: true
                data:
                  content: "# Q2 Budget\n\nTotal: $1.2M\n- Engineering: $800K\n- Marketing: $400K"

- name: directory-search-not-content-search
  description: User asks to find a specific file by name — should use searchManager_searchDirectory not searchContent
  toolSet: meta
  turns:
    - userMessage: "Where is the file called meeting-notes.md?"
      expectedTools:
        - name: getTools
          params:
            tool: "search"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: searchManager
                tool: searchDirectory
                description: Search for files and folders by name pattern
                command: "search search-directory"
                usage: "search search-directory <query>"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'search search-directory "query-value"'
              - agent: searchManager
                tool: searchContent
                description: Search for notes containing specific content
                command: "search search-content"
                usage: "search search-content <query>"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'search search-content "query-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "search search-directory"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: searchDirectory
                success: true
                data:
                  results:
                    - path: meetings/meeting-notes.md
                      type: file
