# Vague and ambiguous user prompts — tests that the model still
# routes to the right tools even without explicit instructions.

- name: vague-find-request
  description: User says "find something" without specifying search vs list
  toolSet: meta
  turns:
    - userMessage: "I need that thing about the project timeline"
      expectedTools:
        - name: getTools
          params:
            tool: "search"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: searchManager
                tool: searchContent
                description: Search for notes containing specific content
                command: "search search-content"
                usage: "search search-content <query>"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'search search-content "query-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "search search-content"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: searchContent
                success: true
                data:
                  results:
                    - path: projects/timeline.md
                      score: 0.88

- name: vague-write-request
  description: User says "save this" without specifying a path or format
  toolSet: meta
  turns:
    - userMessage: "Save this: The meeting is moved to Thursday at 3pm"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: write
                description: Write content to a note file
                command: "content write"
                usage: "content write <path> <content>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: content
                    flag: --content
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'content write "path-value" "content-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "content write"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: write
                success: true

- name: vague-organize-request
  description: User asks to "clean up" which implies move/archive
  toolSet: meta
  allowReorder: true
  turns:
    - userMessage: "Can you clean up the old meeting notes? Move anything from 2024 to the archive folder."
      expectedTools:
        - name: getTools
          params:
            tool: "storage"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: storageManager
                tool: list
                description: List files and folders
                command: "storage list"
                usage: "storage list <path>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'storage list "path-value"'
              - agent: storageManager
                tool: move
                description: Move a file or folder
                command: "storage move"
                usage: "storage move <path> <destination>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: destination
                    flag: --destination
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'storage move "path-value" "destination-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "storage list"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: list
                success: true
                data:
                  items:
                    - name: "2024-q1-meeting.md"
                      type: file
                    - name: "2024-q2-meeting.md"
                      type: file
                    - name: "2025-q1-meeting.md"
                      type: file

    - expectedTools:
        - name: useTools
          params:
            tool: "storage move, storage move"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: move
                success: true
              - tool: move
                success: true

- name: multi-intent-single-message
  description: User asks multiple things in one message — model needs multiple agents
  toolSet: meta
  turns:
    - userMessage: "Read my todo list and also search for any notes about the API redesign"
      expectedTools:
        - name: getTools
          params:
            tool: "content, search"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: read
                description: Read content from a file
                command: "content read"
                usage: "content read <path> <startLine>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: startLine
                    flag: --start-line
                    type: number
                    required: true
                    positional: true
                examples:
                  - 'content read "path-value" 1'
              - agent: searchManager
                tool: searchContent
                description: Search for notes containing specific content
                command: "search search-content"
                usage: "search search-content <query>"
                arguments:
                  - name: query
                    flag: --query
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'search search-content "query-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "content read, search search-content"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: read
                success: true
                data:
                  content: "# Todo\n- Fix login bug\n- Update docs"
              - tool: searchContent
                success: true
                data:
                  results:
                    - path: engineering/api-redesign.md
                      score: 0.91
