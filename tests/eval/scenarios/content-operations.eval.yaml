# Content read/write/update variations — tests correct tool selection
# within the contentManager agent for different write operations.

- name: simple-read
  description: Direct request to read a specific file
  toolSet: meta
  turns:
    - userMessage: "Show me the contents of docs/api-reference.md"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: read
                description: Read content from a file
                command: "content read"
                usage: "content read <path> <startLine>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: startLine
                    flag: --start-line
                    type: number
                    required: true
                    positional: true
                examples:
                  - 'content read "path-value" 1'

    - expectedTools:
        - name: useTools
          params:
            tool: "content read"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: read
                success: true
                data:
                  content: "# API Reference\n\nEndpoints:\n- GET /users\n- POST /users"

- name: create-new-note
  description: User asks to create a brand new note
  toolSet: meta
  turns:
    - userMessage: "Create a new note called ideas/feature-requests.md with a heading and empty bullet list"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: write
                description: Write content to a note file
                command: "content write"
                usage: "content write <path> <content>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: content
                    flag: --content
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'content write "path-value" "content-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "content write"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: write
                success: true

- name: update-existing-note
  description: User asks to add content to an existing note — should use insert rather than write, with or without a preparatory read
  toolSet: meta
  turns:
    - userMessage: "Add a new item to my todo list at notes/todo.md — 'Review pull request #42'"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: read
                description: Read content from a file
                command: "content read"
                usage: "content read <path> <startLine>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: startLine
                    flag: --start-line
                    type: number
                    required: true
                    positional: true
                examples:
                  - 'content read "path-value" 1'
              - agent: contentManager
                tool: insert
                description: Insert content at a specific position
                command: "content insert"
                usage: "content insert <path> <content> <position> [--line-number <lineNumber>]"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: content
                    flag: --content
                    type: string
                    required: true
                    positional: true
                  - name: position
                    flag: --position
                    type: string
                    required: true
                    positional: true
                  - name: lineNumber
                    flag: --line-number
                    type: number
                    required: false
                    positional: false
                examples:
                  - 'content insert "path-value" "content-value" "position-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "content insert"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: insert
                success: true

- name: replace-content
  description: User asks to replace specific text in a note
  toolSet: meta
  turns:
    - userMessage: "In notes/config.md, replace 'staging' with 'production' everywhere"
      expectedTools:
        - name: getTools
          params:
            tool: "content"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: contentManager
                tool: replace
                description: Replace or delete content in a file
                command: "content replace"
                usage: "content replace <path> <search> <replace>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: search
                    flag: --search
                    type: string
                    required: true
                    positional: true
                  - name: replace
                    flag: --replace
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'content replace "path-value" "search-value" "replace-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "content replace"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: replace
                success: true
                data:
                  replacements: 3
