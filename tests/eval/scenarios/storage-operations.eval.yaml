# Storage operations — move, copy, archive, create folder

- name: move-file
  description: User asks to move a file to a different folder
  toolSet: meta
  turns:
    - userMessage: "Move notes/draft.md to the published folder"
      expectedTools:
        - name: getTools
          params:
            tool: "storage"
      mockResponses:
        getTools:
          success: true
          result:
            tools:
              - agent: storageManager
                tool: move
                description: Move a file or folder
                command: "storage move"
                usage: "storage move <path> <destination>"
                arguments:
                  - name: path
                    flag: --path
                    type: string
                    required: true
                    positional: true
                  - name: destination
                    flag: --destination
                    type: string
                    required: true
                    positional: true
                examples:
                  - 'storage move "path-value" "destination-value"'

    - expectedTools:
        - name: useTools
          params:
            tool: "storage move"
      mockResponses:
        useTools:
          success: true
          result:
            results:
              - tool: move
                success: true

